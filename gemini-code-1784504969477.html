<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Laporan Kinerja Dosen</title>
    <style>
        /* CSS untuk menghilangkan margin bawaan dan membuat iframe memenuhi layar */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda */
            font-family: Arial, sans-serif;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Menghilangkan garis pinggir iframe */
        }
    </style>
</head>
<body>

    <!-- Iframe untuk menampilkan Google Apps Script -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxe591Zxhp3duBbyTmlt8gMIV7dpNh8_kb8WL2v7Ifl3wvQH64Fpvpuyv1e04fZLfvSIg/exec" 
        title="Aplikasi Beban Kinerja Dosen"
        allowfullscreen>
    </iframe>

</body>
</html>
